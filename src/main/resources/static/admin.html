<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Панель Адміна</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .ban-btn { background: #dc3545; color: white; border: none; cursor: pointer; padding: 5px; border-radius: 3px; }
        .unban-btn { background: #28a745; color: white; border: none; cursor: pointer; padding: 5px; border-radius: 3px; }
    </style>
</head>
<body>
<h1>Управління користувачами</h1>
<div id="status"></div>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Роль</th>
        <th>Дія</th>
    </tr>
    </thead>
    <tbody id="userTable"></tbody>
</table>

<script>
    const jwtToken = localStorage.getItem('jwtToken');
    const myName = localStorage.getItem('currentUsername');

    async function loadUsers() {
        const res = await fetch('/api/admin/users', {
            headers: { 'Authorization': 'Bearer ' + jwtToken }
        });

        if (!res.ok) {
            document.body.innerHTML = "<h1>403 - Доступ заборонено. Ви не адмін!</h1>";
            return;
        }

        const users = await res.json();
        const table = document.getElementById('userTable');
        table.innerHTML = "";

        users.forEach(u => {
            let actionBtn = '';

            // 1. Якщо юзер забанений - показуємо зелену кнопку UNBAN
            if (u.isBanned) {
                actionBtn = `<button class="unban-btn" onclick="unbanUser('${u.username}')">UNBAN</button>`;
            }
            // 2. Захист від самозабану (перевіряємо ПІСЛЯ перевірки на бан)
            else if (u.username === myName) {
                actionBtn = '<em>Це ви</em>';
            }
            // 3. Звичайний юзер - показуємо BAN
            else {
                actionBtn = `<button class="ban-btn" onclick="banUser('${u.username}')">BAN</button>`;
            }

            // Рожевий фон для забанених
            table.innerHTML += `
                <tr style="${u.isBanned ? 'background-color: #f8d7da;' : ''}">
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td>${u.role}</td>
                    <td>${actionBtn}</td>
                </tr>`;
        });
    }

    async function banUser(username) {
        const reason = prompt("Вкажіть причину бану:");
        if (!reason) return;

        const res = await fetch('/api/admin/ban/' + username, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + jwtToken, 'Content-Type': 'text/plain' },
            body: reason
        });

        if (res.ok) loadUsers(); // Оновлюємо таблицю без перезавантаження сторінки
        else alert("Помилка при бані: " + await res.text());
    }

    async function unbanUser(username) {
        const res = await fetch('/api/admin/unban/' + username, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + jwtToken }
        });

        if (res.ok) loadUsers(); // Оновлюємо таблицю
        else alert("Помилка при розбані: " + await res.text());
    }

    loadUsers();
</script>
</body>
</html>
