<!DOCTYPE html>
<html>
<head>
    <title>Chat Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<div id="messages"></div>
<input type="text" id="messageText" placeholder="sendMessage..."/>
<button onclick="sendMessage()">sendMessage</button>

<script>
    var stompClient = null;
    var roomId = 1; // ID кімнати для тесту

    // УВАГА: Сюди треба вставити реальний токен, який ти отримав після /api/users/login через Postman
    var jwtToken = "СЮДИ_ВСТАВ_СВІЙ_JWT_ТОКЕН";

    function connect() {
        var socket = new SockJS('http://localhost:8080/ws-chat');
        stompClient = Stomp.over(socket);

        // Передаємо токен у заголовках STOMP
        var headers = {
            'Authorization': 'Bearer ' + jwtToken
        };

        stompClient.connect(headers, function (frame) {
            console.log('Connected: ' + frame);
            stompClient.subscribe('/topic/room.' + roomId, function (messageOutput) {
                var resp = JSON.parse(messageOutput.body);
                document.getElementById("messages").innerHTML += "<p><b>" + resp.sender.username + "</b>: " + resp.content + "</p>";
            });
        }, function(error) {
            console.error("Помилка підключення:", error);
            alert("Не вдалося підключитися. Перевір валідність токена!");
        });
    }

    function sendMessage() {
        var text = document.getElementById("messageText").value;
        stompClient.send("/app/chat/" + roomId, {}, text);
    }

    connect();
</script>
</body>
</html>ckr
