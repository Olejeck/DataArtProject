<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Chat Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #fdfdfd; }
        .msg { margin: 5px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .system { color: blue; font-weight: bold; }
    </style>
</head>
<body>
<h2>Чат-кімната</h2>
<div id="messages">
    <div id="history"><em>Завантаження історії...</em></div>
    <div id="new-messages"></div>
</div>

<input type="text" id="messageText" placeholder="Напишіть щось..." style="width: 70%; padding: 5px;"/>
<button onclick="sendMessage()" style="padding: 5px 15px;">Надіслати</button>

<script>
    var stompClient = null;

    // КРОК 1: ПЕРЕВІР ЦЕЙ ID ЧЕРЕЗ POSTMAN (GET /api/rooms/public)
    var roomId = 1;

    // КРОК 2: ВСТАВ СВІЙ ТОКЕН
    var jwtToken = "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJvbGVnIiwiaWF0IjoxNzc0OTAzNzU2LCJleHAiOjE3NzQ5OTAxNTZ9.xiM-UrLmnIZk4WmEjxUOkd0l1WNVAHRYXAFUD150Q4k";

    function loadHistory() {
        console.log("Завантаження історії для кімнати:", roomId);
        fetch('/api/rooms/' + roomId + '/messages', {
            headers: { 'Authorization': 'Bearer ' + jwtToken }
        })
            .then(res => {
                if (res.status === 403 || res.status === 401) {
                    throw new Error("Помилка авторизації (403/401). Онови токен у коді!");
                }
                if (!res.ok) {
                    throw new Error("Сервер повернув помилку: " + res.status);
                }
                return res.json();
            })
            .then(data => {
                const historyDiv = document.getElementById("history");
                historyDiv.innerHTML = "<b>Історія завантажена:</b><br>";
                if (data.length === 0) historyDiv.innerHTML += "<em>Повідомлень поки немає</em>";
                data.forEach(msg => {
                    historyDiv.innerHTML += `<div class='msg'><b>${msg.sender.username}:</b> ${msg.content}</div>`;
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById("history").innerHTML = `<b style='color:red'>${err.message}</b>`;
            });
    }

    function connect() {
        loadHistory(); // Завантажуємо старі повідомлення

        var socket = new SockJS('http://localhost:8080/ws-chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({ 'Authorization': 'Bearer ' + jwtToken }, function (frame) {
            console.log('Успішне з\'єднання!');

            stompClient.subscribe('/topic/room.' + roomId, function (output) {
                var msg = JSON.parse(output.body);
                document.getElementById("new-messages").innerHTML +=
                    `<div class='msg'><b>${msg.sender.username}:</b> ${msg.content}</div>`;

                // Автопрокрутка вниз
                var objDiv = document.getElementById("messages");
                objDiv.scrollTop = objDiv.scrollHeight;
            });
        }, function(error) {
            alert("Помилка підключення! Перевір токен або чи запущено сервер.");
        });
    }

    function sendMessage() {
        var input = document.getElementById("messageText");
        if (input.value.trim() !== "" && stompClient) {
            stompClient.send("/app/chat/" + roomId, {}, input.value);
            input.value = "";
        }
    }

    connect();
</script>
</body>
</html>
