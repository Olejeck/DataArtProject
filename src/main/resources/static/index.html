<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DataArt Messenger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }

        /* Sidebar Styles */
        .sidebar { width: 300px; background: #ffffff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #007bff; color: white; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }
        .section-title { font-size: 0.8rem; font-weight: bold; color: #888; text-transform: uppercase; margin: 15px 0 5px 0; }
        .item { padding: 10px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; transition: 0.2s; border: 1px solid transparent; }
        .item:hover { background: #e9ecef; }
        .item.active { background: #007bff; color: white; }

        /* Chat Area Styles */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: white; }
        .message-input-area { padding: 20px; background: #f0f2f5; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-send { background: #007bff; color: white; }
        .btn-logout { background: #dc3545; color: white; font-size: 0.8rem; margin-top: 10px; }

        .friend-request { background: #fff3cd; border: 1px solid #ffeeba; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div id="userName">Завантаження...</div>
        <button class="btn-logout" onclick="logout()">Вийти</button>
    </div>

    <div class="sidebar-content">
        <div class="section-title">Знайти друга</div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="searchUser" placeholder="Логін..." style="width: 100%; padding: 5px;">
            <button onclick="sendFriendRequest()" style="padding: 5px;">+</button>
        </div>

        <div class="section-title">Запити в друзі</div>
        <div id="pendingList"></div>

        <div class="section-title">Друзі</div>
        <div id="friendsList"></div>

        <div class="section-title">Публічні кімнати</div>
        <div id="roomsList"></div>
    </div>
</div>

<div class="chat-area">
    <div id="messages">
        <div id="history"></div>
        <div id="new-messages"></div>
    </div>
    <div class="message-input-area">
        <button onclick="document.getElementById('fileInput').click()" style="background:none; font-size:1.5rem;">📎</button>
        <input type="file" id="fileInput" style="display:none" onchange="uploadFile(this)">

        <input type="text" id="messageText" placeholder="Напишіть повідомлення...">
        <button class="btn-send" onclick="sendMessage()">Надіслати</button>
    </div>
</div>

<script>
    const jwtToken = localStorage.getItem('jwtToken');
    const currentUsername = localStorage.getItem('currentUsername');
    let stompClient = null;
    let currentRoomId = 1; // За замовчуванням загальна кімната

    if (!jwtToken) window.location.href = "login.html";
    document.getElementById('userName').innerText = "Привіт, " + currentUsername;

    // --- ФУНКЦІЇ API ---

    async function apiRequest(url, method = 'GET') {
        const res = await fetch(url, {
            method: method,
            headers: { 'Authorization': 'Bearer ' + jwtToken, 'Content-Type': 'application/json' }
        });
        if (res.status === 403) logout();
        return res;
    }

    async function loadSidebarData() {
        // 1. Завантаження друзів
        const friendsRes = await apiRequest('/api/friends');
        const friends = await friendsRes.json();
        const fList = document.getElementById('friendsList');
        fList.innerHTML = friends.length ? '' : '<em>Ще немає друзів</em>';
        friends.forEach(f => {
            fList.innerHTML += `<div class="item" onclick="startPrivateChat('${f.username}')">👤 ${f.username}</div>`;
        });

        // 2. Завантаження запитів
        const pendingRes = await apiRequest('/api/friends/pending');
        const pending = await pendingRes.json();
        const pList = document.getElementById('pendingList');
        pList.innerHTML = '';
        pending.forEach(u => {
            pList.innerHTML += `
                <div class="item friend-request">
                    ${u.username}
                    <button onclick="acceptFriend('${u.username}')" style="background:green; color:white; padding:2px 5px;">OK</button>
                </div>`;
        });

        // 3. Завантаження кімнат
        const roomsRes = await apiRequest('/api/rooms/public');
        const rooms = await roomsRes.json();
        const rList = document.getElementById('roomsList');
        rList.innerHTML = '';
        rooms.forEach(r => {
            rList.innerHTML += `<div class="item ${r.id === currentRoomId ? 'active' : ''}" onclick="switchRoom(${r.id})"># ${r.name}</div>`;
        });
    }

    async function sendFriendRequest() {
        const username = document.getElementById('searchUser').value;
        const res = await apiRequest('/api/friends/request/' + username, 'POST');
        if (res.ok) { alert("Запит надіслано!"); loadSidebarData(); }
        else { alert(await res.text()); }
    }

    async function acceptFriend(username) {
        await apiRequest('/api/friends/accept/' + username, 'POST');
        loadSidebarData();
    }

    function switchRoom(id) {
        currentRoomId = id;
        document.getElementById('history').innerHTML = 'Завантаження...';
        document.getElementById('new-messages').innerHTML = '';
        loadHistory();
        loadSidebarData();
        // У реальному проекті тут треба було б відписатися від старого топіка і підписатися на новий
    }

    // --- ВЕБСОКЕТИ ТА ІСТОРІЯ ---

    function loadHistory() {
        apiRequest('/api/rooms/' + currentRoomId + '/messages')
            .then(res => res.json())
            .then(messages => {
                const historyDiv = document.getElementById("history");
                historyDiv.innerHTML = "";
                messages.forEach(msg => formatMessage(msg));
                const objDiv = document.getElementById("messages");
                objDiv.scrollTop = objDiv.scrollHeight;
            });
    }

    function connect() {
        loadSidebarData();
        loadHistory();

        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({ 'Authorization': 'Bearer ' + jwtToken }, function (frame) {
            // Підписуємося на топік поточної кімнати
            // Для простоти поки підписуємося на всі, але в продакшені треба динамічно
            stompClient.subscribe('/topic/room.*', function (output) {
                const msg = JSON.parse(output.body);
                if (msg.room.id === currentRoomId) {
                    document.getElementById("new-messages").innerHTML += formatMessage(msg);
                }
            });
        });
    }

    function sendMessage() {
        const input = document.getElementById("messageText");
        if (input.value.trim() !== "" && stompClient) {
            stompClient.send("/app/chat/" + currentRoomId, {}, input.value);
            input.value = "";
        }
    }

    document.getElementById("messageText").addEventListener("keypress", e => { if(e.key === "Enter") sendMessage(); });

    function logout() { localStorage.clear(); window.location.href = "login.html"; }

    async function startPrivateChat(username) {
        const res = await apiRequest('/api/rooms/private/' + username, 'POST');
        if (res.ok) {
            const room = await res.json();
            // Перемикаємося на цю кімнату
            switchRoom(room.id);
            // Оновлюємо інтерфейс, щоб підсвітити обраний чат
            loadSidebarData();
        } else {
            alert("Не вдалося почати приватний чат");
        }
    }
    async function uploadFile(input) {
        if (!input.files || !input.files[0]) return;

        const formData = new FormData();
        formData.append("file", input.files[0]);

        const res = await fetch('/api/files/upload', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + jwtToken },
            body: formData
        });

        if (res.ok) {
            const data = await res.json();
            // Відправляємо спеціальний маркер [IMAGE] через вебсокет
            stompClient.send("/app/chat/" + currentRoomId, {}, "[IMAGE]" + data.url);
        } else {
            alert("Помилка завантаження файлу");
        }
        input.value = ""; // Очищуємо інпут
    }
    function formatMessage(msg) {
        const isImage = msg.content.startsWith("[IMAGE]");
        const content = isImage
            ? `<br><img src="${msg.content.replace('[IMAGE]', '')}" style="max-width:200px; border-radius:10px; margin-top:5px; border:1px solid #ddd;">`
            : msg.content;

        return `<p><b>${msg.sender.username}:</b> ${content}</p>`;
    }

    // Потім використовуй це:
    // document.getElementById("new-messages").innerHTML += formatMessage(msg);
    connect();
</script>
</body>
</html>
