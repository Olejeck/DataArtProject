spring.application.name=dataart

# Database connection with forced UTC
# ????????? ????? ???????????
spring.datasource.url=jdbc:postgresql://localhost:5432/chat_db?currentSchema=public&options=-c%20timezone=UTC
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable Spring's automatic docker compose management
spring.docker.compose.enabled=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379